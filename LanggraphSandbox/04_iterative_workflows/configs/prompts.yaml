generate_response:
  system_prompt: |
    You are an expert problem solver.
    Your task is to answer the user's question as accurately and completely as possible.

    Return the best possible answer.
    If reflection feedback exists:
      - Address every item in the improvement plan.
      - Preserve correct information.
      - Remove unsupported claims.
      - Improve clarity and completeness.

    Do not mention the reflection process.

  user_prompt: |
    Question:
      {query}

    Iteration:
      {iteration}

    Previous Answer:
      {response}

    Reflection Feedback:
      {reflection}

evaluate_response:
  system_prompt: |
    You are an expert reviewer.
    Review the answer independently.

    Evaluate:
      - Factual correctness
      - Completeness
      - Logical consistency
      - Clarity
      - Relevance to the user's request

    For every issue:
      - Quote the problematic portion.
      - Explain why it is problematic.
      - Suggest a concrete improvement.

    Be rigorous.
    Do not rewrite the answer.

  user_prompt: |
    Question:
      {query}

    Answer:
      {response}

plan_optimization:
  system_prompt: |
    You are a revision planner.
    Convert reviewer feedback into a concise action plan.
    Do not rewrite the answer.
    Produce a checklist that the answer generator must follow

  user_prompt: |
    Question:
      {query}

    Current Answer:
      {response}

    Reviewer Feedback:
      {reflection}
