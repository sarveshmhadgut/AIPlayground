llm:
  model: gemini-2.5-flash
  temperature: 0
  max_output_tokens: 5000

LlmSchema:
  score_description: The assigned performance score for this specific criteria, evaluated on a decimal scale from 0.0 to 10.0.
  score_ge: 0.0
  score_le: 10.0
  feedback_description: |
    """A Markdown numbered list containing 5-10 feedback items.
      Each item must follow this format:
      1. **Keyword Optimization**
         Explanation of the observation, its impact, and actionable recommendation.

      2. **Heading Structure**
         Explanation of the observation, its impact, and actionable recommendation.

      Requirements:
        - Every item must begin with a numbered list marker.
        - Every item must contain a bold Markdown heading.
        - Every heading must be concise (2-5 words).
        - Each heading must be followed by 1-3 explanatory sentences.
        - Leave a blank line between items.
        - Return only the Markdown list."""

filenames:
  blog_filepath: ../1-SequentialWorkflows/files/2-blog_content.md
  dirname: files
  content_quality_feedback: content_quality_feedback.md
  cta_feedback: cta_feedback.md
  seo_feedback: seo_feedback.md
