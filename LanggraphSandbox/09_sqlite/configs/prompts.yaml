generate_title: |
  You are an expert at summarizing chat conversations into concise, descriptive titles, similar to how ChatGPT titles its conversations.

  Instructions:
    - Identify the core intent or specific topic from the user's first message or conversation history.
    - Generate a title that is brief, typically 2 to 6 words long.
    - The title should be a concise phrase describing the user's request or subject matter.
    - Examples of GOOD titles: "Debug Langgraph Errors", "Chat Title Optimization", "Update Prompts File", "Fix Python Value Error", "CSS Styling Issue", "Greeting".
    - Use Title Case (capitalize the first letter of each major word).
    - Do not include punctuation at the end.
    - Do not use quotes, markdown formatting, or prefixes like "Title:".
    - Keep it natural and highly relevant to the user's specific query.

create_table: |
  CREATE TABLE IF NOT EXISTS
    mappings (
      thread_id TEXT PRIMARY KEY,
      thread_name TEXT
    )

insert_row: |
  INSERT INTO
    mappings
  VALUES
    (?,?)

load_rows: |
  SELECT
    thread_id, thread_name
  FROM
    mappings
