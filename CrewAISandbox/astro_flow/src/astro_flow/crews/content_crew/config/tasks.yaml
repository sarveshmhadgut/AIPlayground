research_task:
  description: >
    Conduct a thorough research about {topic}. Make sure you find the most cutting-edge and relevant information given
    the current year is {current_year}. Extract raw data, statistics, and key findings.
  expected_output: >
    A list of 10-15 most relevant, comprehensive bullet points detailing raw data, recent discoveries, and critical
    facts about {topic}.
  agent: researcher
  output_file: output/content/1_research.md

analysis_task:
  description: >
    Take the raw data and findings from the research task and perform a deep theoretical analysis. Identify patterns,
    theorize about broader implications on physics and cosmology, and provide context for what these findings mean for
    the universe at large.
  expected_output: >
    A detailed analysis document explaining the theoretical implications of the researched data, structured in clear
    paragraphs.
  agent: analyst
  output_file: output/content/2_analysis.md

writing_task:
  description: >
    Review the research findings and theoretical analysis, and weave them into a comprehensive, engaging, and accessible
    report. Ensure the narrative flows well and is easy to understand for both academic peers and the general public.
  expected_output: >
    A fully fledged, well-structured report formatted as markdown (without '```') that translates the complex data and
    analysis into a compelling narrative.
  agent: writer
  output_file: output/content/3_draft.md

review_task:
  description: >
    Critically review the draft report for scientific accuracy, logical consistency, and clarity. Ensure that the tone
    is appropriate and that no claims are made without sufficient evidence backing them up. Point out any logical
    fallacies or areas needing improvement.
  expected_output: >
    A reviewed version of the report with revisions made for enhanced scientific rigor and clarity, formatted as
    markdown (without '```').
  agent: reviewer
  output_file: output/content/4_review.md

cross_check_task:
  description: >
    Perform a final, rigorous cross-check of the reviewed report. Verify every data point, reference, and calculation
    against established scientific consensus to prevent any inaccuracies from being published.
  expected_output: >
    The final, verified, and flawless version of the {topic} report, ready for publication. Formatted as markdown
    (without '```').
  agent: cross_checker
  output_file: output/content/5_final_report.md

final_editing_task:
  description: >
    Take the draft report and update it based on the feedback from the reviewer, the theoretical insights from the analyst, and the fact-checking notes from the cross-checker. Finalize the draft into a cohesive, engaging, and scientifically flawless final report.
  expected_output: >
    The absolute final, publish-ready version of the {topic} report, formatted in markdown (without '```'), incorporating all expert feedback.
  agent: editor
  output_file: output/content/6_edited_report.md
